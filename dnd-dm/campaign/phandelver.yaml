# Lost Mine of Phandelver — Part 1: Goblin Arrows
# Structure/facts adapted for the dnd-dm engine. Scene notes are original factual
# summaries; the DM model generates all narration live (no boxed text is copied).
# Monster stats are from the 5e SRD. Built from the user's own purchased copy.

meta:
  slug: phandelver
  title: "Lost Mine of Phandelver"
  ruleset: "5e-srd-5.1"
  starting_scene: the-road-to-phandalin
  level_range: [1, 2]
  tone: "Classic heroic D&D on the Sword Coast frontier — adventurous, with a thread of menace under the goblin raids. Keep it brisk and evocative."
  arc: >-
    The adventure runs in five parts. (1) GOBLIN ARROWS — the party is ambushed escorting
    Gundren Rockseeker's supply wagon, tracks the Cragmaw goblins to a cave hideout, frees the
    warrior Sildar, and learns Gundren and his map to Wave Echo Cave were taken on to Cragmaw
    Castle. (2) PHANDALIN — the frontier town is bullied by the Redbrand ruffians, secretly led
    by "Glasstaff", who is the missing Lords' Alliance wizard Iarno Albrek; here the party gathers
    leads toward Cragmaw Castle and the lost mine. (3) CRAGMAW CASTLE — storm the goblin
    stronghold, confront King Grol, rescue Gundren, recover the map. (4) WILDERNESS — chase leads
    across the region (Old Owl Well, the ruins of Thundertree, and more) on the way to the mine.
    (5) WAVE ECHO CAVE — the lost mine and its Forge of Spells, where the true mastermind is faced:
    the Black Spider, a drow named Nezznar, who set the whole plot in motion to seize the Forge.
    Through-line: Gundren's map leads to Wave Echo Cave and the Forge of Spells, with the Black
    Spider behind everything from the first ambush. Only Part 1 is built so far — foreshadow the
    larger story, but reveal nothing ahead of the party.
  safety:
    lines: []
    veils: ["graphic torture of prisoners — keep Sildar's mistreatment off-screen"]

locations:
  - slug: triboar-trail
    name: "The Triboar Trail"
    region: "Sword Coast frontier"
    description: "A rough wilderness road running east toward Phandalin; woods press close, with steep embankments and thickets where raiders can hide."
  - slug: cragmaw-hideout
    name: "Cragmaw Hideout"
    region: "Sword Coast frontier"
    description: "A cave complex in a hillside about five miles northwest of the ambush site, used by the Cragmaw goblin tribe to raid the trail. A cold stream runs through it; stalactite vaults, rubble, and stalagmites throughout."
  - slug: phandalin
    name: "Phandalin"
    region: "Sword Coast frontier"
    description: "A small frontier town being resettled near the ruins of an old mining settlement. Destination of Gundren's supply wagon. (Part 2.)"

npcs:
  - slug: gundren-rockseeker
    name: "Gundren Rockseeker"
    role: "dwarf prospector and the party's patron"
    location: null
    disposition: 40
    persona: "An excitable, secretive dwarf who hired the party in Neverwinter to haul a wagon of supplies to Phandalin. Rode ahead with a warrior escort to 'take care of business.'"
    knowledge: "He and his brothers Tharden and Nundro rediscovered the lost entrance to Wave Echo Cave and the mine of the Phandelver's Pact. He carried a map to it."
    secrets: "He was captured by the Cragmaw goblins on the Black Spider's orders and taken — with his map — to King Grol at Cragmaw Castle. He is NOT in the hideout."
  - slug: sildar-hallwinter
    name: "Sildar Hallwinter"
    role: "human warrior, agent of the Lords' Alliance"
    location: goblin-den
    disposition: 30
    persona: "A kindhearted human of nearly fifty, formerly of Waterdeep's griffon cavalry. Honorable and steady; eager to reach Phandalin. Currently a beaten prisoner, weak and at 1 HP."
    knowledge: "Gundren's map was taken; he believes Klarg sent Gundren and the map onward to King Grol at Cragmaw Castle. He came to find Iarno Albrek, a Lords' Alliance wizard who vanished in Phandalin about two months ago. The three Rockseeker brothers found Wave Echo Cave (the Phandelver's Pact)."
    secrets: "If freed and healed he'll join the party to Phandalin and pay 50 gp (a loan, settled in town)."
  - slug: klarg
    name: "Klarg"
    role: "bugbear boss of the Cragmaw hideout"
    location: klargs-cave
    disposition: -60
    persona: "A bugbear with delusions of grandeur who speaks of himself in the third person ('Klarg will build a throne from your bones!'). Sees himself as a warlord-in-the-making. His goblins resent his bullying."
    knowledge: "Answers to King Grol, chief of the Cragmaws at Cragmaw Castle. A messenger relayed the Black Spider's order to waylay Gundren and send him and his map to Grol."
    secrets: "He obeyed — Gundren and the map were sent on to Cragmaw Castle. Keeps the tribe's stolen plunder (and a hidden chest) in his cave."
  - slug: yeemik
    name: "Yeemik"
    role: "goblin, second-in-command of the hideout"
    location: goblin-den
    disposition: -40
    persona: "An ambitious, cowardly, treacherous goblin who schemes to overthrow Klarg and run the hideout himself."
    knowledge: "Knows the hideout layout and that Klarg holds the loot in area 8. Holds Sildar hostage."
    secrets: "Will betray any bargain — even if the party kills Klarg for him, he'll still demand a ransom for Sildar."
  - slug: king-grol
    name: "King Grol"
    role: "chief of the Cragmaw goblins (offscreen, Cragmaw Castle)"
    location: null
    disposition: -70
    persona: "A brutal bugbear king ruling the Cragmaw tribe from Cragmaw Castle, northeast in Neverwinter Wood."
    knowledge: "Holds the captured Gundren and his map."
    secrets: "Is in the pay of the Black Spider. (Part 3.)"
  - slug: black-spider
    name: "the Black Spider"
    role: "hidden mastermind (offscreen)"
    location: null
    disposition: -90
    persona: "A shadowy figure pulling the Cragmaws' strings. The party knows only the name, whispered by goblins."
    knowledge: "Wants the location of Wave Echo Cave and the Forge of Spells within it."
    secrets: "Is Nezznar, a drow. Orchestrated Gundren's capture to seize the map. Do not reveal until much later."

